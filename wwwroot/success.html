<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán Thành Công - Payment Demo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container status-container">
        <div class="status-icon success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>Thanh Toán Thành Công!</h1>
        <p>Cảm ơn bạn đã sử dụng dịch vụ. Đơn hàng của bạn đang được xử lý.</p>
        
        <div class="payment-card" style="display: block; width: 100%; max-width: 500px; margin-top: 30px;">
            <div id="details">
                <p>Đang tải thông tin...</p>
            </div>
        </div>

        <a href="/" class="back-home">Quay lại Trang Chủ</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gateway = urlParams.get('gateway');
        const orderId = urlParams.get('orderId') || urlParams.get('orderCode') || 'Không xác định';

        document.getElementById('details').innerHTML = `
            <p style="margin-bottom: 10px;"><strong>Cổng thanh toán:</strong> ${gateway?.toUpperCase()}</p>
            <p><strong>Mã đơn hàng:</strong> ${orderId}</p>
        `;
    </script>
</body>
</html>
